services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: currency_exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrator:
    build:
      context: .
      dockerfile: DbMigrator/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=currency_exchange;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: UserService/UserService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=currency_exchange;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Jwt__Key: "super-secret-jwt-signing-key-min-32-chars!!"
      Jwt__Issuer: "currency-exchange"
      Jwt__Audience: "currency-exchange"
      Jwt__ExpiryMinutes: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully

  finance-service:
    build:
      context: .
      dockerfile: FinanceService/FinanceService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=currency_exchange;Username=postgres;Password=postgres"
      Jwt__Key: "super-secret-jwt-signing-key-min-32-chars!!"
      Jwt__Issuer: "currency-exchange"
      Jwt__Audience: "currency-exchange"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully

  currency-worker:
    build:
      context: .
      dockerfile: CurrencyWorker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=currency_exchange;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

volumes:
  postgres_data:
